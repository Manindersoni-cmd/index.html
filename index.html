<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Auténtica Michoacana</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff8f2;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #6b0038;
    }

    .logo {
      width: 100px;
      mix-blend-mode: multiply; /* 🔥 removes white edge look */
    }

    .menu {
      max-width: 900px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card-img {
      height: 150px;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 10px;
    }

    .price {
      color: #d6217a;
      font-weight: bold;
    }
  </style>
</head>

<body>

<nav>
  <img src="logo.png" class="logo" alt="Logo">
</nav>

<h1 style="text-align:center;">Menu</h1>

<div class="menu">

  <div class="card">
    <div class="card-img">
      <img src="images/torta.jpg" alt="Torta">
    </div>
    <div class="card-body">
      <h3>Tortas</h3>
      <p class="price">$12.00</p>
    </div>
  </div>

  <div class="card">
    <div class="card-img">
      <img src="images/tacos.jpg" alt="Tacos">
    </div>
    <div class="card-body">
      <h3>Tacos</h3>
      <p class="price">$3.00</p>
    </div>
  </div>

  <div class="card">
    <div class="card-img">
      <img src="images/quesabirria.jpg" alt="Quesabirria">
    </div>
    <div class="card-body">
      <h3>Quesabirria</h3>
      <p class="price">$14.99</p>
    </div>
  </div>

  <div class="card">
    <div class="card-img">
      <img src="images/fresas.jpg" alt="Fresas">
    </div>
    <div class="card-body">
      <h3>Fresas</h3>
      <p class="price">$12.00</p>
    </div>
  </div>

</div>

</body>
</html>
